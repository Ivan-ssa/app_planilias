<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Planilhas</title>
    <!-- 1. Importando a biblioteca SheetJS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <h2>Leitura e Exportação de Equipamentos</h2>
    
    <!-- 2. Input para ler a planilha -->
    <input type="file" id="uploadExcel" accept=".xlsx, .xls" />
    
    <!-- 3. Botão para exportar a planilha (escondido inicialmente) -->
    <button id="exportExcel" style="display:none;">Salvar e Exportar Planilha</button>

    <script>
        // Variável para guardar os dados da planilha na memória do sistema
        let dadosPlanilha = [];

        // --- LÓGICA DE LEITURA ---
        document.getElementById('uploadExcel').addEventListener('change', (evento) => {
            const arquivo = evento.target.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                // Lê o arquivo Excel
                const workbook = XLSX.read(data, {type: 'array'});

                // Pega a primeira aba da planilha
                const nomePrimeiraAba = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[nomePrimeiraAba];

                // Converte a planilha em um Array de Objetos (JSON)
                // O {defval: ""} garante que células vazias não quebrem as colunas
                dadosPlanilha = XLSX.utils.sheet_to_json(worksheet, {defval: ""});
                
                console.log("Dados importados:", dadosPlanilha);
                alert("Planilha lida com sucesso! Você já pode editar os dados no sistema.");
                
                // Mostra o botão de exportar agora que temos os dados
                document.getElementById('exportExcel').style.display = 'block';
            };

            reader.readAsArrayBuffer(arquivo);
        });

        // --- LÓGICA DE SALVAMENTO/EXPORTAÇÃO ---
        document.getElementById('exportExcel').addEventListener('click', () => {
            if (dadosPlanilha.length === 0) {
                alert("Nenhum dado para exportar.");
                return;
            }

            // Converte os dados (que você pode ter editado no sistema) de volta para o formato de planilha
            const novaWorksheet = XLSX.utils.json_to_sheet(dadosPlanilha);
            const novoWorkbook = XLSX.utils.book_new();

            // Adiciona os dados ao novo arquivo Excel
            XLSX.utils.book_append_sheet(novoWorkbook, novaWorksheet, "Equipamentos_Atualizados");

            // Baixa o arquivo para o computador do usuário mantendo o formato original
            XLSX.writeFile(novoWorkbook, "planilha_atualizada.xlsx");
        });
    </script>
</body>
</html>
